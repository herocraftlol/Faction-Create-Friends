name: FactionPlugin
version: 3.2.4
main: fr.faction.FactionPlugin
api-version: 1.20
author: FactionDev
description: Plugin de factions complet — claim, banque émeraudes, troc, stats, classements

commands:
  faction:
    description: Commande principale des factions
    usage: /faction [sous-commande]
    aliases: [f, fac]

permissions:
  faction.use:
    description: Utiliser les commandes de faction
    default: true
  faction.admin:
    description: Commandes admin faction (bypass claim)
    default: op
